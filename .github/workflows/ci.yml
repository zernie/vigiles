name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-ruff-pylint

      - name: Cache gem packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/gem
          key: gem-${{ runner.os }}-rubocop

      - run: npm ci

      - name: Install linter CLIs for tests
        run: |
          pip install ruff pylint
          gem install rubocop
          rustup component add clippy

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Check generated types compile
        run: node dist/cli.js generate-types && npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run fmt:check

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Audit compiled files
        run: node dist/cli.js audit
