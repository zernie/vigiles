name: "agent-lint"
description: "Validate that CLAUDE.md rules have enforcement annotations"
branding:
  icon: "check-circle"
  color: "orange"

inputs:
  paths:
    description: "Comma-separated paths to CLAUDE.md files to validate"
    required: false
    default: "CLAUDE.md"
  follow-symlinks:
    description: "Follow symbolic links when reading CLAUDE.md files"
    required: false
    default: "false"
  markers:
    description: "Comma-separated rule marker types: headings, checkboxes"
    required: false

runs:
  using: "node20"
  main: "action.mjs"
