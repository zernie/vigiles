name: "vigiles"
description: "Compile typed specs to instruction files and verify integrity"
branding:
  icon: "check-circle"
  color: "orange"

inputs:
  command:
    description: "Command to run: 'compile' or 'check' (default: check)"
    required: false
    default: "check"
  paths:
    description: "Comma-separated paths to .spec.ts files (compile) or .md files (check). Auto-discovers by default."
    required: false
  max-rules:
    description: "Maximum number of rules per spec file"
    required: false
  catalog-only:
    description: "Only check that linter rules exist, skip config-enabled checks (true/false)"
    required: false
    default: "false"

runs:
  using: "node20"
  main: "dist/action.js"
